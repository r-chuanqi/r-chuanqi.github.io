<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>请先登录 — 博客</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f6fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e8e8e8;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo .icon {
      font-size: 48px;
      display: block;
      margin-bottom: 8px;
    }

    .logo h1 {
      font-size: 22px;
      color: #1a1a2e;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .logo p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    /* 角色切换 Tab */
    .role-tabs {
      display: flex;
      border-radius: 10px;
      background: #f1f3f8;
      padding: 4px;
      margin-bottom: 28px;
    }

    .role-tabs button {
      flex: 1;
      border: none;
      background: transparent;
      padding: 10px 0;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
    }

    .role-tabs button.active {
      background: #fff;
      color: #5c6bc0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    /* 表单 */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .prefix-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: #aaa;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px 12px 40px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      color: #333;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fafafa;
    }

    .form-group input:focus {
      border-color: #5c6bc0;
      box-shadow: 0 0 0 3px rgba(92,107,192,0.15);
      background: #fff;
    }

    /* 显示/隐藏密码 */
    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: #aaa;
      padding: 4px;
    }

    .eye-btn:hover { color: #5c6bc0; }

    /* 错误提示 */
    .error-msg {
      background: #fff3f3;
      border: 1px solid #ffcdd2;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #d32f2f;
      margin-bottom: 18px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .error-msg.show { display: flex; }

    /* 登录按钮 */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #5c6bc0, #7986cb);
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 1px;
    }

    .btn-login:hover { opacity: 0.92; }
    .btn-login:active { transform: scale(0.98); }

    .footer-tip {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #bbb;
    }

    /* 当前角色指示 */
    .role-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .role-badge.admin { background: #ede7f6; color: #512da8; }
    .role-badge.user  { background: #e3f2fd; color: #1565c0; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <span class="icon">📖</span>
    <h1>智能知识库学习考试系统</h1>
    <p>请选择身份并输入访问密码</p>
  </div>

  <!-- 角色 Tab -->
  <div class="role-tabs">
    <button id="tab-admin" class="active" onclick="switchRole('admin')">
      👑 管理员
    </button>
    <button id="tab-user" onclick="switchRole('user')">
      👤 普通用户
    </button>
  </div>

  <!-- 错误提示 -->
  <div class="error-msg" id="error-msg">
    <span>⚠️</span>
    <span id="error-text">密码错误，请重试</span>
  </div>

  <!-- 表单 -->
  <form id="login-form" onsubmit="doLogin(event)">
    <div class="form-group">
      <label>
        <span id="role-badge" class="role-badge admin">管理员</span>
      </label>
      <div class="input-wrap">
        <span class="prefix-icon">🔒</span>
        <input
          type="password"
          id="password"
          placeholder="请输入密码"
          autocomplete="current-password"
          autofocus
        />
        <button type="button" class="eye-btn" onclick="togglePwd()">👁</button>
      </div>
    </div>

    <button type="submit" class="btn-login" id="btn-login">
      登 录
    </button>
  </form>

</div>

<script>
  // ============================================================
  //  ⚙️ 密码配置区 — 修改这里的密码
  // ============================================================
  const CONFIG = {
    admin: {
      password: "admin123",    // ← 管理员密码
      redirectUrl: "/"         // ← 登录后跳转地址
    },
    user: {
      password: "user123",     // ← 普通用户密码
      redirectUrl: "/"         // ← 登录后跳转地址
    }
  };
  // ============================================================

  let currentRole = "admin";

  // 如果已登录，直接跳走
  (function checkAlreadyLoggedIn() {
    const role = sessionStorage.getItem("blog_role");
    const ts   = sessionStorage.getItem("blog_login_ts");
    if (role && ts) {
      const age = Date.now() - parseInt(ts, 10);
      if (age < 24 * 60 * 60 * 1000) {   // 24h 有效期
        window.location.replace(CONFIG[role]?.redirectUrl || "/");
      } else {
        sessionStorage.removeItem("blog_role");
        sessionStorage.removeItem("blog_login_ts");
      }
    }
  })();

  function switchRole(role) {
    currentRole = role;
    document.getElementById("tab-admin").classList.toggle("active", role === "admin");
    document.getElementById("tab-user").classList.toggle("active",  role === "user");
    const badge = document.getElementById("role-badge");
    if (role === "admin") {
      badge.textContent = "管理员";
      badge.className = "role-badge admin";
    } else {
      badge.textContent = "普通用户";
      badge.className = "role-badge user";
    }
    hideError();
    document.getElementById("password").focus();
  }

  function doLogin(e) {
    e.preventDefault();
    const pwd    = document.getElementById("password").value;
    const config = CONFIG[currentRole];

    if (!config) { showError("未知角色"); return; }

    if (pwd === config.password) {
      // 存储登录态
      sessionStorage.setItem("blog_role",     currentRole);
      sessionStorage.setItem("blog_login_ts", String(Date.now()));

      const btn = document.getElementById("btn-login");
      btn.textContent = "✅ 验证成功，跳转中...";
      btn.disabled = true;

      // 登录成功后始终跳转到首页
      setTimeout(() => {
        window.location.replace(config.redirectUrl);
      }, 600);
    } else {
      showError("密码错误，请重试");
      shake();
    }
  }

  function showError(msg) {
    const el = document.getElementById("error-msg");
    document.getElementById("error-text").textContent = msg;
    el.classList.add("show");
  }

  function hideError() {
    document.getElementById("error-msg").classList.remove("show");
  }

  function togglePwd() {
    const input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
  }

  // 震动动画（密码错误时）
  function shake() {
    const form = document.getElementById("login-form");
    form.style.animation = "none";
    form.offsetHeight; // reflow
    form.style.animation = "shake 0.4s ease";
  }
</script>

<style>
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-8px); }
    40%       { transform: translateX(8px); }
    60%       { transform: translateX(-5px); }
    80%       { transform: translateX(5px); }
  }
</style>
</body>
</html>
